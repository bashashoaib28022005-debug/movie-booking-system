<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | ShoNova</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#0A0A0B;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    padding: 20px;
}

.box{
    background:#1a1a1c;
    padding:40px 30px;
    border-radius:15px;
    width:100%;
    max-width:350px; /* PC-la compact-ah irukkum */
    text-align:center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    border: 1px solid #333;
}

h2 { color: #FF0032; margin-bottom: 25px; font-weight: 800; }

input{
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #333;
    border-radius: 8px;
    background: #2a2a2a;
    color: white;
    box-sizing: border-box; /* Padding handling for mobile */
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: #FF0032;
}

button{
    width:100%;
    padding:14px;
    background:#FF0032;
    border:none;
    border-radius:8px;
    color:white;
    font-weight: 700;
    cursor:pointer;
    transition: 0.3s;
    margin-top: 10px;
}

button:hover{ background:#e6002c; transform: translateY(-2px); }

#otpSection {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #333;
}

.info-text { font-size: 12px; color: #94a3b8; margin-top: 10px; }
</style>
</head>
<body>

<div class="box">
    <h2>ShoNova Register</h2>
    
    <div id="registerForm">
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email Address">
        <input type="tel" id="mobile" placeholder="10 Digit Mobile Number">
        
        <button onclick="sendOTP()">Send OTP</button>
    </div>

    <div id="otpSection" style="display:none;">
        <p class="info-text">Enter the 4-digit code sent to your mobile</p>
        <input type="text" id="otp" placeholder="Enter OTP (Ex: 1234)" maxlength="4">
        <button onclick="verifyOTP()">Verify & Start Booking</button>
    </div>
</div>

<script>
let generatedOTP = null;

function sendOTP(){
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const mobile = document.getElementById("mobile").value.trim();

    // Validation
    if(name === "" || email === "" || mobile === ""){
        alert("Machi, ellam field-aiyum fill pannu!");
        return;
    }

    if(!email.includes("@")){
        alert("Email format thappa irukku!");
        return;
    }

    if(!/^[0-9]{10}$/.test(mobile)){
        alert("Mobile number 10 digits irukkanum!");
        return;
    }

    // Fake OTP Generation
    generatedOTP = Math.floor(1000 + Math.random() * 9000);
    
    // Simulating SMS alert
    alert("ShoNova Security: Your OTP is " + generatedOTP);

    // Hide register form and show OTP section
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("otpSection").style.display = "block";
}

function verifyOTP(){
    const enteredOTP = document.getElementById("otp").value.trim();

    if(enteredOTP == generatedOTP){
        // Storing User Data for Ticket
        localStorage.setItem("userName", document.getElementById("name").value);
        localStorage.setItem("userEmail", document.getElementById("email").value);
        localStorage.setItem("userMobile", document.getElementById("mobile").value);
        localStorage.setItem("isLoggedIn", "true");

        alert("Welcome to ShoNova! Login Successful.");
        window.location.href = "index.html"; // Redirect to Movies list
    } else {
        alert("OTP Thappu machi! Check pannu.");
    }
}
</script>

</body>
</html>
