<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | ShoNova</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>

/* FULL SCREEN CINEMA BACKGROUND */

body{
    margin:0;
    font-family:'Plus Jakarta Sans',sans-serif;

    background:
    radial-gradient(circle at 20% 30%, rgba(255,0,50,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,150,255,0.25), transparent 40%),
    #050505;

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CENTER CONTAINER */

.auth-container{
    width:380px;
    animation: fadeIn 0.8s ease;
}

/* LOGO */

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:white;
    font-weight:800;
    letter-spacing:2px;

    background:linear-gradient(90deg,#ff0032,#00c3ff);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* GLASS CARD */

.modal{
    background: rgba(20,20,20,0.85);

    backdrop-filter: blur(30px);

    border-radius:20px;

    box-shadow:
    0 0 40px rgba(255,0,50,0.2),
    0 0 80px rgba(0,150,255,0.15);

    border:1px solid rgba(255,255,255,0.08);
}

/* INPUT */

.input-group input{

    background: rgba(0,0,0,0.6);

    border:1px solid rgba(255,255,255,0.1);

    color:white;
}

.input-group input:focus{

    border:1px solid #ff0032;

    box-shadow:0 0 15px rgba(255,0,50,0.5);
}

/* BUTTON */

.auth-submit{

    background: linear-gradient(135deg,#ff0032,#ff3366);

    box-shadow:0 0 25px rgba(255,0,50,0.5);
}

.auth-submit:hover{

    box-shadow:0 0 40px rgba(255,0,50,0.8);

    transform: translateY(-3px);
}

/* TEXT */

.auth-footer{
    color:#aaa;
}

.auth-footer-link{
    color:#ff0032;
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="auth-container">

    <div class="logo">
        <h1>ShoNova</h1>
    </div>

    <div class="modal">

        <div class="auth-tabs">

            <div class="auth-tab active">
                Login
            </div>

            <div class="auth-tab"
            onclick="location.href='signup.html'">

                Sign Up

            </div>

        </div>

        <div class="auth-body">

            <div class="input-group">

                <input type="email"
                id="email"
                placeholder="Enter Email">

            </div>

            <div class="input-group">

                <input type="password"
                id="password"
                placeholder="Enter Password">

            </div>

            <button class="auth-submit"
            onclick="doLogin()">

            LOGIN

            </button>

            <p class="auth-footer">

            Don't have account?

            <a href="signup.html"
            class="auth-footer-link">

            Create Account

            </a>

            </p>

        </div>

    </div>

</div>

<script>

async function doLogin(){

const email =
document.getElementById('email').value;

const password =
document.getElementById('password').value;

const res =
await fetch('/login',{

method:'POST',

credentials:'include',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
email,
password
})

});

const data = await res.json();

if(data.success){

location.href='/movies.html';

}
else{

alert("Login failed");

}

}

</script>

</body>
</html>
